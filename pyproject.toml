[project]
name = "safeharbor"
version = "0.1.0"
description = "Locally-hostable open-source aquarium tracker"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Daniel W. Anner", email = "daniel.anner@danstechsupport.com" }]
dependencies = [
    "bleach>=6.0",
    "flask>=3.0",
    "flask-login>=0.6",
    "flask-wtf>=1.2",
    "flask-migrate>=4.0",
    "flask-sqlalchemy>=3.1",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.1",
    "redis>=5.0",
    "rq>=1.16",
    "gunicorn>=22.0",
    "sentry-sdk[flask]>=2.0",
    "python-dotenv>=1.0",
    "uuid-utils>=0.9",
    "argon2-cffi>=23.1",
    "passlib[argon2]>=1.7",
    "python-json-logger>=2.0",
    "alembic>=1.13",
    "email-validator>=2.0",
    "markdown-it-py>=3.0",
    "Pillow>=10.0",
    "pillow-heif>=0.16",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "libsass>=0.23",
    "pytest-flask>=1.3",
    "pytest-postgresql>=6.0",
    "mypy>=1.10",
    "ruff>=0.5",
    "pre-commit>=3.7",
    "playwright>=1.47",
    "pytest-playwright>=0.5",
    "pillow>=10.0",
    "pixelmatch>=0.3",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Legacy app code (kept for reference until v1 cutover) and generated files.
# Mirrors the .pre-commit-config.yaml exclude.
extend-exclude = [
    "SAFEHARBOR",
    "migrations/versions",
    "docs/design/*/canvases",
    "docs/design/*/styleguide",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = [
    "E501",   # line-length handled by formatter
    "UP047",  # PEP 695 generics; pre-commit's mypy doesn't support them yet
]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint.isort]
known-first-party = ["safeharbor"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["sqlalchemy.ext.mypy.plugin"]
exclude = ["SAFEHARBOR/", "migrations/versions/", "tests/"]

[[tool.mypy.overrides]]
module = [
    "redis",
    "redis.*",
    "flask_login",
    "flask_login.*",
    "flask_migrate",
    "flask_migrate.*",
    "flask_wtf",
    "flask_wtf.*",
    "wtforms",
    "wtforms.*",
    "rq",
    "rq.*",
    "passlib",
    "passlib.*",
    "pillow_heif",
    "pillow_heif.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# python-json-logger has no type stubs and does not re-export JsonFormatter at
# the submodule level; suppress all errors for this package.
module = ["pythonjsonlogger", "pythonjsonlogger.*"]
ignore_missing_imports = true
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
# Visual-regression tests need Playwright Chromium + a running app server,
# so they're opted out of the default collection and run in their own CI job
# (see .github/workflows/ci.yml). Run them locally with `pytest tests/visual`.
addopts = "-q --tb=short --ignore=tests/visual"
