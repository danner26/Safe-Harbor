{% extends "base.html" %}

{% block title %}More · Safe Harbor{% endblock %}

{% block content %}
<div class="container">
  <header style="margin-bottom: 24px;">
    <p class="eyebrow">More</p>
    <h1 style="font-family: var(--font-display); font-size: 32px; font-weight: 600; margin: 0;">More</h1>
  </header>

  <nav class="card" aria-label="More navigation" data-more-hub>
    <ul class="sh-feed">
      <li>
        <a class="sh-feed-item" href="{{ url_for('animals.list_animals') }}" style="color: inherit; text-decoration: none; align-items: center;">
          <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5c-3 0-5 2-5 5v4c0 3 2 5 5 5s5-2 5-5v-4c0-3-2-5-5-5Z"></path>
            <path d="M9 10h.01"></path>
            <path d="M15 10h.01"></path>
          </svg>
          <span>Livestock</span>
          <span class="muted" aria-hidden="true">&rsaquo;</span>
        </a>
      </li>
      <li>
        <a class="sh-feed-item" href="{{ url_for('measurements.index') }}" style="color: inherit; text-decoration: none; align-items: center;">
          <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19V5"></path>
            <path d="M4 19h16"></path>
            <path d="m7 15 4-4 3 3 5-6"></path>
          </svg>
          <span>Measurements</span>
          <span class="muted" aria-hidden="true">&rsaquo;</span>
        </a>
      </li>
      <li>
        <a class="sh-feed-item" href="{{ url_for('settings.display') }}" style="color: inherit; text-decoration: none; align-items: center;">
          <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v4"></path>
            <path d="M12 18v4"></path>
            <path d="m4.9 4.9 2.8 2.8"></path>
            <path d="m16.3 16.3 2.8 2.8"></path>
            <path d="M2 12h4"></path>
            <path d="M18 12h4"></path>
            <path d="m4.9 19.1 2.8-2.8"></path>
            <path d="m16.3 7.7 2.8-2.8"></path>
          </svg>
          <span>Settings</span>
          <span class="muted" aria-hidden="true">&rsaquo;</span>
        </a>
      </li>
      <li>
        <a class="sh-feed-item" href="{{ url_for('coming_soon.feature', feature='reports') }}" style="color: inherit; text-decoration: none; align-items: center;">
          <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5V4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5Z"></path>
            <path d="M8 7h8"></path>
            <path d="M8 11h8"></path>
            <path d="M8 15h5"></path>
          </svg>
          <span>Reports</span>
          <span class="muted" aria-hidden="true">&rsaquo;</span>
        </a>
      </li>
    </ul>
  </nav>
</div>
{% endblock %}
