{% extends "base.html" %}

{% block title %}{{ title }} · Safe Harbor{% endblock %}

{% block content %}
<div class="container" style="max-width: 720px; margin: 48px auto; padding: 0 20px;">
  <article class="card" style="padding: 32px; text-align: center;">
    <p class="eyebrow" style="margin-bottom: 8px;">Coming soon</p>
    <h1 style="margin: 0 0 12px; font-family: var(--font-display); font-size: 32px; font-weight: 600;">{{ title }}</h1>
    <p class="muted" style="margin: 0 auto 24px; max-width: 460px; font-size: 15px;">{{ description }}</p>
    <a href="{{ url_for('home.index') }}" class="btn btn-primary">Back to dashboard</a>
  </article>
</div>
{% endblock %}
