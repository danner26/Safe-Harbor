{% extends "base.html" %}
{% block title %}Email confirmation expired · Safe Harbor{% endblock %}
{% block content %}
<section class="section">
  <div class="container" style="max-width: 560px;">
    <div class="card" style="padding: 28px; text-align: center;">
      <h1 style="font-family: var(--font-display); font-size: 24px; margin: 0 0 12px;">
        Email confirmation link expired
      </h1>
      <p class="muted">This email confirmation link is invalid or expired.</p>
      <p style="margin-top: 18px;">
        <a class="btn btn-primary" href="{{ url_for('settings.account') }}">
          Back to account settings
        </a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
