{% extends "base.html" %}
{% block title %}{% block settings_title %}Settings{% endblock %} · Safe Harbor{% endblock %}

{% block content %}
<div class="container" style="max-width: 1000px; margin: 32px auto; padding: 0 20px;">
  <p class="eyebrow">Settings</p>
  <h1 style="font-family: var(--font-display); font-size: 28px; font-weight: 600; margin: 0 0 24px;">{{ self.settings_title() }}</h1>

  <div style="display: grid; grid-template-columns: 200px 1fr; gap: 24px;">
    <nav class="card" style="padding: 12px; align-self: start;">
      <ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px;">
        <li><a href="{{ url_for('settings.display') }}" class="settings-nav-link{% if request.endpoint == 'settings.display' %} on{% endif %}">Display</a></li>
        <li><a href="{{ url_for('settings.account') }}" class="settings-nav-link{% if request.endpoint == 'settings.account' %} on{% endif %}">Account</a></li>
        <li><a href="{{ url_for('settings.system') }}" class="settings-nav-link{% if request.endpoint == 'settings.system' %} on{% endif %}">System</a></li>
      </ul>
    </nav>
    <main>
      {% block settings_content %}{% endblock %}
    </main>
  </div>
</div>

{% endblock %}
