services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safeharbor
      POSTGRES_PASSWORD: safeharbor
      POSTGRES_DB: safeharbor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "safeharbor"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    image: ghcr.io/danner26/safeharbor:${SAFEHARBOR_VERSION:-latest}
    env_file: .env
    environment:
      FLASK_CONFIG: development
      DATABASE_URL: postgresql+psycopg://safeharbor:safeharbor@postgres:5432/safeharbor
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - uploads:/data/uploads
      - ./backups:/backups:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    image: ghcr.io/danner26/safeharbor:${SAFEHARBOR_VERSION:-latest}
    env_file: .env
    environment:
      FLASK_CONFIG: development
      DATABASE_URL: postgresql+psycopg://safeharbor:safeharbor@postgres:5432/safeharbor
      REDIS_URL: redis://redis:6379/0
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "default"]
    volumes:
      - ./backups:/backups:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backups:
    image: ghcr.io/danner26/safeharbor:${SAFEHARBOR_VERSION:-latest}
    profiles: ["backup"]
    command: ["tail", "-f", "/dev/null"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://safeharbor:safeharbor@postgres:5432/safeharbor
    volumes:
      - uploads:/data/uploads:rw
      - ./backups:/backups:rw
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.daily-backup.schedule: "${BACKUP_SCHEDULE:-0 0 3 * * *}"
      ofelia.job-exec.daily-backup.command: "flask safeharbor backup"
    restart: unless-stopped

  ofelia:
    image: mcuadros/ofelia:0.3.22
    profiles: ["backup"]
    command: ["daemon", "--docker"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    depends_on:
      backups:
        condition: service_started
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2024.10.0
    profiles: ["tunnel"]
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    profiles: ["dev"]
    ports:
      - "8025:8025"  # web UI
      - "1025:1025"  # SMTP

volumes:
  pgdata:
  uploads:
