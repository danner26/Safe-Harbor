name: Feature request
description: Suggest an enhancement to Safe Harbor.
title: "feat: <short summary>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new feature or enhancement. Focus on the
        problem first; design discussion happens once scope is clear.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user need or workflow that is missing or painful today.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you ruled them out.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, related projects, or anything else useful.
