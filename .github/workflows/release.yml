name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64 by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=ghcr.io/danner26/safeharbor,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/danner26/safeharbor:cache-amd64
          cache-to: type=registry,ref=ghcr.io/danner26/safeharbor:cache-amd64,mode=max

  build-arm64:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arm64 by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=ghcr.io/danner26/safeharbor,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/danner26/safeharbor:cache-arm64
          cache-to: type=registry,ref=ghcr.io/danner26/safeharbor:cache-arm64,mode=max

  combine-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/danner26/safeharbor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          flavor: latest=false
      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          docker buildx imagetools create "${TAG_ARGS[@]}" \
            ghcr.io/danner26/safeharbor@${{ needs.build-amd64.outputs.digest }} \
            ghcr.io/danner26/safeharbor@${{ needs.build-arm64.outputs.digest }}
      - name: Inspect multi-arch manifest
        run: |
          set -euo pipefail
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker buildx imagetools inspect "$PRIMARY_TAG" | tee /tmp/inspect.txt
          grep -q "linux/amd64" /tmp/inspect.txt
          grep -q "linux/arm64" /tmp/inspect.txt
